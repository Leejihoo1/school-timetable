<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숭문고등학교 시간표 & 급식</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600 mb-2">🏫 숭문고등학교 매니저</h1>
            <p id="current-date-text" class="text-gray-500 text-sm font-medium">정보를 불러오는 중...</p>
        </header>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-6max-w-md mx-auto">
            <div class="flex items-center justify-center gap-4">
                <div class="flex items-center gap-2">
                    <input type="number" id="grade" value="1" min="1" max="3" class="w-16 p-2 bg-gray-50 border border-gray-200 rounded-xl text-center font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <span class="text-gray-600 font-medium">학년</span>
                </div>
                <div class="flex items-center gap-2">
                    <input type="number" id="classNm" value="1" min="1" max="15" class="w-16 p-2 bg-gray-50 border border-gray-200 rounded-xl text-center font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <span class="text-gray-600 font-medium">반</span>
                </div>
                <button onclick="loadDefaultData()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-4 py-2 rounded-xl transition duration-200 cursor-pointer text-sm">
                    변경
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">📅 오늘의 시간표</h2>
                <div class="overflow-hidden rounded-xl border border-gray-100">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-indigo-50 text-indigo-700 font-semibold text-sm">
                                <th class="p-3 text-center w-20">교시</th>
                                <th class="p-3">과목명</th>
                            </tr>
                        </thead>
                        <tbody id="timetable-body" class="divide-y divide-gray-100 text-gray-700">
                            <tr>
                                <td colspan="2" class="p-8 text-center text-gray-400">시간표를 불러오는 중입니다...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">🍔 오늘의 급식</h2>
                <div id="meal-content" class="bg-orange-50/50 p-4 rounded-xl border border-orange-100 text-gray-700 min-h-[200px] flex flex-col justify-center items-center text-center">
                    <p class="text-gray-400">급식을 불러오는 중...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
