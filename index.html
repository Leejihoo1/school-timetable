<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리학교 매니저 - 시간표 & 급식</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600 mb-2">🏫 우리학교 매니저</h1>
            <p class="text-gray-500 text-sm">실시간 시간표와 오늘의 급식을 확인하세요!</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">학교급</label>
                    <select id="schulCrseScCode" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="2">초등학교</option>
                        <option value="3">중학교</option>
                        <option value="4" selected>고등학교</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">학교명</label>
                    <input type="text" id="schulNm" placeholder="예: 서울고등학교" value="서울고등학교" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">학년</label>
                        <input type="number" id="grade" value="1" min="1" max="6" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl text-center focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">반</label>
                        <input type="number" id="classNm" value="1" min="1" max="20" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl text-center focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div class="flex items-end">
                    <button onclick="fetchSchoolData()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold p-2.5 rounded-xl transition duration-200 shadow-sm cursor-pointer">
                        조회하기
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">📅 오늘의 시간표</h2>
                <div class="overflow-hidden rounded-xl border border-gray-100">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-indigo-50 text-indigo-700 font-semibold text-sm">
                                <th class="p-3 text-center w-20">교시</th>
                                <th class="p-3">과목명</th>
                            </tr>
                        </thead>
                        <tbody id="timetable-body" class="divide-y divide-gray-100 text-gray-700">
                            <tr>
                                <td colspan="2" class="p-8 text-center text-gray-400">학교를 검색해 주세요.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">🍔 오늘의 급식</h2>
                <div id="meal-content" class="bg-orange-50/50 p-4 rounded-xl border border-orange-100 text-gray-700 min-h-[200px] flex flex-col justify-center items-center text-center">
                    <p class="text-gray-400">조회 버튼을 누르면<br>급식 메뉴가 나타납니다.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
